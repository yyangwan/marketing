<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #0B0F1A;
        font-family: "Geist", -apple-system, BlinkMacSystemFont, sans-serif;
      }
      .scene {
        position: absolute;
        top: 0;
        left: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
      }
      #scene1 { z-index: 1; background: #0B0F1A; }
      #scene2 { z-index: 2; background: #0B0F1A; opacity: 0; }
      #scene3 { z-index: 3; background: #0B0F1A; opacity: 0; }
      #scene4 { z-index: 4; background: #0B0F1A; opacity: 0; }
      #scene5 { z-index: 5; background: #0B0F1A; opacity: 0; }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="geo-guide"
      data-width="1080"
      data-height="1920"
      data-start="0"
      data-duration="25"
    >
      <!-- Scene 1: Hook (0–3s) -->
      <div
        id="scene1"
        class="scene"
        data-composition-id="scene-1"
        data-composition-src="compositions/scene-1-hook.html"
        data-start="0"
        data-duration="3"
        data-track-index="1"
        data-width="1080"
        data-height="1920"
      ></div>

      <!-- Scene 2: GEO Intro (3–8s) -->
      <div
        id="scene2"
        class="scene"
        data-composition-id="scene-2"
        data-composition-src="compositions/scene-2-geo-intro.html"
        data-start="3"
        data-duration="5"
        data-track-index="1"
        data-width="1080"
        data-height="1920"
      ></div>

      <!-- Scene 3: Warning (8–13s) -->
      <div
        id="scene3"
        class="scene"
        data-composition-id="scene-3"
        data-composition-src="compositions/scene-3-warning.html"
        data-start="8"
        data-duration="5"
        data-track-index="1"
        data-width="1080"
        data-height="1920"
      ></div>

      <!-- Scene 4: Three Steps (13–20s) -->
      <div
        id="scene4"
        class="scene"
        data-composition-id="scene-4"
        data-composition-src="compositions/scene-4-three-steps.html"
        data-start="13"
        data-duration="7"
        data-track-index="1"
        data-width="1080"
        data-height="1920"
      ></div>

      <!-- Scene 5: CTA (20–25s) -->
      <div
        id="scene5"
        class="scene"
        data-layout-allow-overflow
        data-composition-id="scene-5"
        data-composition-src="compositions/scene-5-cta.html"
        data-start="20"
        data-duration="5"
        data-track-index="1"
        data-width="1080"
        data-height="1920"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      // ---- Transition 1→2: Zoom through (0.3s) ----
      var T1 = 2.7;
      tl.to("#scene1", { scale: 1.1, filter: "blur(15px)", opacity: 0, duration: 0.3, ease: "power3.in" }, T1);
      tl.set("#scene1", { visibility: "hidden" }, T1 + 0.3);
      tl.fromTo("#scene2", { opacity: 0, scale: 0.92, filter: "blur(10px)" }, { opacity: 1, scale: 1, filter: "blur(0px)", duration: 0.4, ease: "power2.out" }, T1 + 0.15);

      // ---- Transition 2→3: Hard cut ----
      var T2 = 7.85;
      tl.set("#scene2", { opacity: 0, visibility: "hidden" }, T2);
      tl.set("#scene3", { opacity: 1 }, T2);

      // ---- Transition 3→4: Push slide ----
      var T3 = 12.7;
      tl.to("#scene3", { x: -400, filter: "blur(20px)", opacity: 0, duration: 0.3, ease: "power3.in" }, T3);
      tl.set("#scene3", { visibility: "hidden" }, T3 + 0.3);
      tl.fromTo("#scene4", { opacity: 0, x: 400, filter: "blur(20px)" }, { opacity: 1, x: 0, filter: "blur(0px)", duration: 0.35, ease: "power3.out" }, T3 + 0.1);

      // ---- Transition 4→5: Crossfade ----
      var T4 = 19.6;
      tl.to("#scene4", { filter: "blur(10px)", scale: 1.03, opacity: 0, duration: 0.4, ease: "power2.inOut" }, T4);
      tl.set("#scene4", { visibility: "hidden" }, T4 + 0.4);
      tl.fromTo("#scene5", { opacity: 0 }, { opacity: 1, duration: 0.4, ease: "power2.inOut" }, T4 + 0.1);
      // Scene 5 is the last scene — sub-composition handles its own fade-out
      tl.set("#scene5", { visibility: "hidden" }, 24.8);

      window.__timelines["geo-guide"] = tl;
    </script>
  </body>
</html>
