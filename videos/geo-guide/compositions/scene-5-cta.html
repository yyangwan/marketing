<template id="scene-5-template">
<div data-composition-id="scene-5" data-width="1080" data-height="1920" data-start="0" data-duration="5" data-layout-allow-overflow>

  <style>
    [data-composition-id="scene-5"] {
      --s5-canvas: #0B0F1A;
      --s5-accent: #00D4AA;
      --s5-gold: #FFBE0B;
      --s5-text: #F0F2F5;
      --s5-muted: #8892A4;
      --s5-border: #2A3050;

      position: relative;
      width: 1080px;
      height: 1920px;
      background: var(--s5-canvas);
      overflow: hidden;
      font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* BG: Dual radial glows */
    .s5-glow-left {
      position: absolute;
      top: 30%;
      left: -50px;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(0, 212, 170, 0.15) 0%,
        rgba(0, 212, 170, 0.05) 40%,
        transparent 70%
      );
      pointer-events: none;
    }

    .s5-glow-right {
      position: absolute;
      top: 50%;
      right: 80px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(255, 190, 11, 0.12) 0%,
        rgba(255, 190, 11, 0.04) 40%,
        transparent 70%
      );
      pointer-events: none;
    }

    /* Content area */
    .s5-content {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 85%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 80px;
      box-sizing: border-box;
      gap: 36px;
    }

    /* "2026流量密码" hero */
    .s5-hero {
      font-size: 56px;
      font-weight: 900;
      color: var(--s5-gold);
      letter-spacing: -0.03em;
      text-align: center;
      text-shadow: 0 0 40px rgba(255,190,11,0.3);
      max-width: 800px;
    }

    /* Accent line */
    .s5-divider {
      width: 300px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--s5-accent), transparent);
      opacity: 0.5;
      transform: scaleX(0);
    }

    /* CTA text */
    .s5-cta-main {
      font-size: 34px;
      font-weight: 600;
      color: var(--s5-text);
      text-align: center;
      line-height: 1.6;
      max-width: 900px;
    }

    .s5-cta-main em {
      font-style: normal;
      color: var(--s5-accent);
      font-weight: 800;
    }

    /* "关注" button pill */
    .s5-follow-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 18px 44px;
      background: var(--s5-accent);
      border-radius: 50px;
      font-size: 32px;
      font-weight: 700;
      color: var(--s5-canvas);
      box-shadow: 0 0 40px rgba(0,212,170,0.4);
    }

    /* Sub text */
    .s5-sub {
      font-size: 26px;
      font-weight: 400;
      color: var(--s5-muted);
      text-align: center;
      line-height: 1.6;
      max-width: 800px;
    }

    /* Fade wrapper for exit */
    .s5-fade-wrapper {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* Decorative corner marks */
    .s5-corner {
      position: absolute;
      width: 30px;
      height: 30px;
      border-color: rgba(0,212,170,0.25);
      border-style: solid;
    }
    .s5-corner-tl { top: 60px; left: 40px; border-width: 2px 0 0 2px; }
    .s5-corner-tr { top: 60px; right: 40px; border-width: 2px 2px 0 0; }
    .s5-corner-bl { bottom: 60px; left: 40px; border-width: 0 0 2px 2px; }
    .s5-corner-br { bottom: 60px; right: 40px; border-width: 0 2px 2px 0; }
  </style>

  <!-- Glows (decorative, intentional overflow) -->
  <div class="s5-glow-left" id="s5-gl" data-layout-allow-overflow></div>
  <div class="s5-glow-right" id="s5-gr" data-layout-allow-overflow></div>

  <!-- Corners -->
  <div class="s5-corner s5-corner-tl"></div>
  <div class="s5-corner s5-corner-tr"></div>
  <div class="s5-corner s5-corner-bl"></div>
  <div class="s5-corner s5-corner-br"></div>

  <div class="s5-fade-wrapper" id="s5-fade">
    <!-- Content -->
    <div class="s5-content">
      <div class="s5-hero" id="s5-hero">2026流量密码</div>
      <div class="s5-divider" id="s5-divider"></div>
      <div class="s5-cta-main" id="s5-cta">
        点赞收藏，评论区扣<em>'GEO'</em>
      </div>
      <div class="s5-follow-btn" id="s5-btn">关注我</div>
      <div class="s5-sub" id="s5-sub">
        我手把手教你避坑<br>
        2026稳稳吃透流量红利
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    var tl = gsap.timeline({ paused: true });

    // 1. Hero text builds in character-by-character effect via y + opacity stagger
    // We'll split "2026流量密码" into segments for stagger
    tl.fromTo('#s5-hero',
      { y: 40, opacity: 0 },
      { y: 0, opacity: 1, duration: 0.7, ease: 'power3.out' },
      0.15
    );

    // 2. Divider scales in
    tl.to('#s5-divider',
      { scaleX: 1, duration: 0.5, ease: 'power2.out' },
      0.5
    );

    // 3. CTA text slides up
    tl.fromTo('#s5-cta',
      { y: 30, opacity: 0 },
      { y: 0, opacity: 1, duration: 0.5, ease: 'power2.out' },
      0.7
    );

    // 4. Follow button POPS in
    tl.fromTo('#s5-btn',
      { scale: 0, opacity: 0 },
      { scale: 1, opacity: 1, duration: 0.4, ease: 'elastic.out(1,0.5)' },
      1.0
    );

    // 5. Sub text fades in
    tl.fromTo('#s5-sub',
      { y: 20, opacity: 0 },
      { y: 0, opacity: 1, duration: 0.5, ease: 'power2.out' },
      1.3
    );

    // 6. Left glow breathes — cycle ~2s, repeats = ceil(5/2)-1 = 1
    tl.fromTo('#s5-gl',
      { x: 0 },
      { x: 20, duration: 1.0, yoyo: true, repeat: 4, ease: 'sine.inOut' },
      0
    );

    // 7. Right glow breathes (offset timing)
    tl.fromTo('#s5-gr',
      { x: 0 },
      { x: -20, duration: 1.2, yoyo: true, repeat: 3, ease: 'sine.inOut' },
      0.3
    );

    // 8. Button glow pulse
    // cycle ~1.5s, repeats = ceil(5/1.5)-1 = 2
    tl.fromTo('#s5-btn',
      { boxShadow: '0 0 40px rgba(0,212,170,0.4)' },
      { boxShadow: '0 0 60px rgba(0,212,170,0.7)', duration: 0.75, yoyo: true, repeat: 5, ease: 'sine.inOut' },
      1.0
    );

    // 9. Final fade-out (last scene, exit allowed)
    tl.to('#s5-fade',
      { opacity: 0, filter: 'blur(8px)', duration: 0.8, ease: 'power2.in' },
      4.0
    );

    window.__timelines['scene-5'] = tl;
  </script>

</div>
</template>
