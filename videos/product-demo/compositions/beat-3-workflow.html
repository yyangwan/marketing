<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Beat 3 — The Workflow</title>
<style>
[data-composition-id="beat-3"] *,
[data-composition-id="beat-3"] *::before,
[data-composition-id="beat-3"] *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

[data-composition-id="beat-3"] {
  position: relative;
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  font-family: 'Geist', 'Geist Sans', system-ui, sans-serif;
  background: #F9FAFB;
}

/* ── Background horizontal rules ── */
[data-composition-id="beat-3"] .bg-rules {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

[data-composition-id="beat-3"] .bg-rule {
  position: absolute;
  left: 0;
  width: 100%;
  height: 2px;
  background: #E5E7EB;
  opacity: 0.2;
}

/* ── Background "10" watermark ── */
[data-composition-id="beat-3"] .watermark {
  position: absolute;
  bottom: 40px;
  right: 80px;
  font-family: 'Geist', 'Geist Sans', sans-serif;
  font-size: 120px;
  font-weight: 800;
  color: #4F46E5;
  opacity: 0;
  line-height: 1;
  pointer-events: none;
  z-index: 0;
  user-select: none;
}

/* ── Kanban board container ── */
[data-composition-id="beat-3"] .kanban-board {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 100px 60px 140px 60px;
  z-index: 1;
}

[data-composition-id="beat-3"] .kanban-columns {
  display: flex;
  gap: 12px;
  width: 100%;
  max-width: 1780px;
}

/* ── Individual column ── */
[data-composition-id="beat-3"] .kanban-col {
  flex: 1;
  min-width: 0;
  max-width: 178px;
  background: #FFFFFF;
  border: 2px solid #E5E7EB;
  border-radius: 8px;
  overflow: hidden;
  opacity: 0;
  transform: translateY(40px);
}

[data-composition-id="beat-3"] .kanban-col .col-top-border {
  height: 3px;
  width: 100%;
}

[data-composition-id="beat-3"] .col-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 14px 10px;
}

[data-composition-id="beat-3"] .col-name {
  font-size: 16px;
  font-weight: 600;
  color: #111827;
  line-height: 1.2;
}

[data-composition-id="beat-3"] .col-badge {
  font-family: 'Geist Mono', monospace;
  font-size: 14px;
  color: #4F46E5;
  font-weight: 500;
  background: rgba(79, 70, 229, 0.08);
  border-radius: 4px;
  padding: 2px 6px;
  transform: scale(0);
}

/* ── Content card inside columns ── */
[data-composition-id="beat-3"] .col-cards {
  padding: 0 10px 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

[data-composition-id="beat-3"] .content-card {
  background: #FFFFFF;
  border: 1px solid #E5E7EB;
  border-radius: 6px;
  padding: 10px 12px;
  opacity: 0;
  transform: translateY(20px);
}

[data-composition-id="beat-3"] .content-card .card-title {
  font-size: 16px;
  font-weight: 500;
  color: #111827;
  line-height: 1.3;
  margin-bottom: 6px;
}

[data-composition-id="beat-3"] .content-card .card-meta {
  font-family: 'Geist Mono', monospace;
  font-size: 16px;
  color: #6B7280;
  line-height: 1.2;
}

[data-composition-id="beat-3"] .content-card .card-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-right: 6px;
  vertical-align: middle;
}

/* ── Connector SVG ── */
[data-composition-id="beat-3"] .connector-svg {
  position: absolute;
  bottom: 80px;
  left: 60px;
  z-index: 2;
  pointer-events: none;
  overflow: visible;
}

[data-composition-id="beat-3"] .connector-path {
  fill: none;
  stroke: #4F46E5;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  opacity: 0.5;
}
</style>
</head>
<body>

<template id="beat-3-template">
<div data-composition-id="beat-3" data-width="1920" data-height="1080" data-start="0" data-duration="6.65">

  <!-- Background horizontal rules every 80px -->
  <div class="bg-rules" aria-hidden="true">
    <div class="bg-rule" style="top: 80px;"></div>
    <div class="bg-rule" style="top: 160px;"></div>
    <div class="bg-rule" style="top: 240px;"></div>
    <div class="bg-rule" style="top: 320px;"></div>
    <div class="bg-rule" style="top: 400px;"></div>
    <div class="bg-rule" style="top: 480px;"></div>
    <div class="bg-rule" style="top: 560px;"></div>
    <div class="bg-rule" style="top: 640px;"></div>
    <div class="bg-rule" style="top: 720px;"></div>
    <div class="bg-rule" style="top: 800px;"></div>
    <div class="bg-rule" style="top: 880px;"></div>
    <div class="bg-rule" style="top: 960px;"></div>
  </div>

  <!-- Background "10" watermark -->
  <div class="watermark" aria-hidden="true">10</div>

  <!-- Kanban board -->
  <div class="kanban-board">
    <div class="kanban-columns">

      <!-- Column 1: AI草稿 -->
      <div class="kanban-col" data-col="1">
        <div class="col-top-border" style="background: #4F46E5;"></div>
        <div class="col-header">
          <span class="col-name">AI草稿</span>
          <span class="col-badge">3</span>
        </div>
        <div class="col-cards">
          <div class="content-card">
            <div class="card-title">春季促销文案</div>
            <div class="card-meta"><span class="card-dot" style="background:#4F46E5;"></span>微信</div>
          </div>
        </div>
      </div>

      <!-- Column 2: Genie生成 -->
      <div class="kanban-col" data-col="2">
        <div class="col-top-border" style="background: #4F46E5;"></div>
        <div class="col-header">
          <span class="col-name">Genie生成</span>
          <span class="col-badge">7</span>
        </div>
        <div class="col-cards">
          <div class="content-card">
            <div class="card-title">品牌故事系列</div>
            <div class="card-meta"><span class="card-dot" style="background:#4F46E5;"></span>微博</div>
          </div>
        </div>
      </div>

      <!-- Column 3: 人工编辑 -->
      <div class="kanban-col" data-col="3">
        <div class="col-top-border" style="background: #6B7280;"></div>
        <div class="col-header">
          <span class="col-name">人工编辑</span>
          <span class="col-badge">12</span>
        </div>
        <div class="col-cards">
          <div class="content-card">
            <div class="card-title">产品评测内容</div>
            <div class="card-meta"><span class="card-dot" style="background:#6B7280;"></span>小红书</div>
          </div>
        </div>
      </div>

      <!-- Column 4: 客户审核 -->
      <div class="kanban-col" data-col="4">
        <div class="col-top-border" style="background: #D97706;"></div>
        <div class="col-header">
          <span class="col-name">客户审核</span>
          <span class="col-badge">5</span>
        </div>
        <div class="col-cards">
          <div class="content-card">
            <div class="card-title">618大促方案</div>
            <div class="card-meta"><span class="card-dot" style="background:#D97706;"></span>抖音</div>
          </div>
        </div>
      </div>

      <!-- Column 5: 需修改 -->
      <div class="kanban-col" data-col="5">
        <div class="col-top-border" style="background: #DC2626;"></div>
        <div class="col-header">
          <span class="col-name">需修改</span>
          <span class="col-badge">2</span>
        </div>
        <div class="col-cards">
          <div class="content-card">
            <div class="card-title">端午活动海报</div>
            <div class="card-meta"><span class="card-dot" style="background:#DC2626;"></span>需调整</div>
          </div>
        </div>
      </div>

      <!-- Column 6: 已批准 -->
      <div class="kanban-col" data-col="6">
        <div class="col-top-border" style="background: #16A34A;"></div>
        <div class="col-header">
          <span class="col-name">已批准</span>
          <span class="col-badge">8</span>
        </div>
        <div class="col-cards">
          <div class="content-card">
            <div class="card-title">新品首发稿件</div>
            <div class="card-meta"><span class="card-dot" style="background:#16A34A;"></span>已通过</div>
          </div>
        </div>
      </div>

      <!-- Column 7: 已排期 -->
      <div class="kanban-col" data-col="7">
        <div class="col-top-border" style="background: #D97706;"></div>
        <div class="col-header">
          <span class="col-name">已排期</span>
          <span class="col-badge">6</span>
        </div>
        <div class="col-cards">
          <div class="content-card">
            <div class="card-title">母亲节专题</div>
            <div class="card-meta"><span class="card-dot" style="background:#D97706;"></span>5/12 发布</div>
          </div>
        </div>
      </div>

      <!-- Column 8: 发布中 -->
      <div class="kanban-col" data-col="8">
        <div class="col-top-border" style="background: #2563EB;"></div>
        <div class="col-header">
          <span class="col-name">发布中</span>
          <span class="col-badge">1</span>
        </div>
        <div class="col-cards">
          <div class="content-card">
            <div class="card-title">限时折扣通知</div>
            <div class="card-meta"><span class="card-dot" style="background:#2563EB;"></span>进行中</div>
          </div>
        </div>
      </div>

      <!-- Column 9: 发布失败 -->
      <div class="kanban-col" data-col="9">
        <div class="col-top-border" style="background: #DC2626;"></div>
        <div class="col-header">
          <span class="col-name">发布失败</span>
          <span class="col-badge">0</span>
        </div>
        <div class="col-cards">
          <div class="content-card">
            <div class="card-title">接口异常通知</div>
            <div class="card-meta"><span class="card-dot" style="background:#DC2626;"></span>待重试</div>
          </div>
        </div>
      </div>

      <!-- Column 10: 已发布 -->
      <div class="kanban-col" data-col="10">
        <div class="col-top-border" style="background: #16A34A;"></div>
        <div class="col-header">
          <span class="col-name">已发布</span>
          <span class="col-badge">15</span>
        </div>
        <div class="col-cards">
          <div class="content-card">
            <div class="card-title">五一活动回顾</div>
            <div class="card-meta"><span class="card-dot" style="background:#16A34A;"></span>已完成</div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Connector SVG line — positioned to align with column centers.
       10 columns, flex:1 in 1780px container, gap:12px
       Each col = (1780 - 9*12) / 10 = 167.2px wide
       Centers: 83.6, 262.8, 442.0, 621.2, 800.4, 979.6, 1158.8, 1338.0, 1517.2, 1696.4 -->
  <svg class="connector-svg" width="1780" height="20" viewBox="0 0 1780 20" aria-hidden="true">
    <path class="connector-path" d="
      M 83.6,10
      L 262.8,10
      L 442.0,10
      L 621.2,10
      L 800.4,10
      L 979.6,10
      L 1158.8,10
      L 1338.0,10
      L 1517.2,10
      L 1696.4,10
    " />
  </svg>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
  window.__timelines = window.__timelines || {};

  var tl = gsap.timeline({ paused: true });

  // ── 0.0s — Background "10" watermark fades in ──
  tl.fromTo(
    ".watermark",
    { opacity: 0 },
    { opacity: 0.08, duration: 1.0, ease: "power2.out" },
    0
  );

  // ── 0.3s — Columns cascade in ──
  tl.fromTo(
    ".kanban-col",
    { y: 40, opacity: 0 },
    {
      y: 0,
      opacity: 1,
      duration: 0.5,
      ease: "power2.out",
      stagger: 0.15,
    },
    0.3
  );

  // ── Content cards slide up within each column ──
  var columns = document.querySelectorAll(".kanban-col");
  columns.forEach(function (col, i) {
    var cards = col.querySelectorAll(".content-card");
    var colStart = 0.3 + (i + 1) * 0.15 - 0.1;

    tl.fromTo(
      cards,
      { y: 20, opacity: 0 },
      {
        y: 0,
        opacity: 1,
        duration: 0.35,
        ease: "power2.out",
        stagger: 0.1,
      },
      colStart
    );
  });

  // ── Count badges scale in ──
  tl.fromTo(
    ".col-badge",
    { scale: 0 },
    {
      scale: 1,
      duration: 0.35,
      ease: "back.out(2)",
      stagger: 0.15,
    },
    0.45
  );

  // ─~2.1s — Connector SVG stroke draw ──
  var connectorPath = document.querySelector(".connector-path");
  var pathLength = connectorPath.getTotalLength();
  connectorPath.style.strokeDasharray = pathLength;
  connectorPath.style.strokeDashoffset = pathLength;

  tl.to(
    connectorPath,
    {
      strokeDashoffset: 0,
      duration: 0.8,
      ease: "power2.inOut",
    },
    2.1
  );

  // ── Slow horizontal drift (camera effect) ──
  tl.fromTo(
    ".kanban-board",
    { x: 0 },
    { x: 60, duration: 6.65, ease: "power1.inOut" },
    0
  );

  // ── Slight scale zoom (camera) ──
  tl.fromTo(
    "[data-composition-id='beat-3']",
    { scale: 1.0 },
    { scale: 1.02, duration: 6.65, ease: "power1.inOut" },
    0
  );

  // Register timeline
  window.__timelines["beat-3"] = tl;
  </script>

</div>
</template>

</body>
</html>
