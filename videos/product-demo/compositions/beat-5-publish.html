<template id="beat-5-template">
<div data-composition-id="beat-5" data-width="1920" data-height="1080" data-start="0" data-duration="2.44"
     style="
       position: relative;
       width: 1920px;
       height: 1080px;
       background: #F9FAFB;
       overflow: hidden;
       font-family: 'Geist', sans-serif;
     ">

  <!-- Subtle dot grid background texture -->
  <svg style="position:absolute;top:0;left:0;width:100%;height:100%;opacity:0.06;pointer-events:none;" aria-hidden="true">
    <defs>
      <pattern id="beat5-dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
        <circle cx="20" cy="20" r="1.5" fill="#4F46E5"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#beat5-dots)"/>
  </svg>

  <!-- PHASE 1: Publish Button -->
  <div id="beat5-publish-btn"
       style="
         position: absolute;
         top: 0; left: 0; right: 0; bottom: 0;
         display: flex;
         align-items: center;
         justify-content: center;
         z-index: 2;
       ">
    <div style="
          display: inline-flex;
          align-items: center;
          justify-content: center;
          background: #4F46E5;
          border-radius: 60px;
          padding: 32px 80px;
          box-shadow: 0 0 40px rgba(79,70,229,0.3);
          transform: scale(0);
          opacity: 0;
        ">
      <span style="
            font-size: 64px;
            font-weight: 700;
            color: #FFFFFF;
            letter-spacing: -0.02em;
            line-height: 1;
          ">发布</span>
    </div>
  </div>

  <!-- PHASE 2: Analytics Dashboard -->
  <div id="beat5-stats-container"
       style="
         position: absolute;
         top: 0; left: 0; right: 0; bottom: 0;
         display: flex;
         align-items: center;
         justify-content: center;
         gap: 48px;
         z-index: 3;
         opacity: 0;
       ">

    <!-- Card 1: Total Content -->
    <div class="beat5-stat-card" style="
          background: #FFFFFF;
          border-radius: 3px;
          border: 1px solid #E5E7EB;
          border-top: 2px solid #4F46E5;
          padding: 32px 48px;
          text-align: center;
          min-width: 220px;
          opacity: 0;
          transform: translateY(30px);
        ">
      <div class="beat5-counter" data-target="128" data-decimals="0"
           style="
             font-size: 80px;
             font-weight: 800;
             color: #111827;
             line-height: 1;
             margin-bottom: 8px;
           ">0</div>
      <div style="
            font-size: 20px;
            color: #6B7280;
            font-weight: 400;
          ">总内容</div>
    </div>

    <!-- Card 2: Average Quality -->
    <div class="beat5-stat-card" style="
          background: #FFFFFF;
          border-radius: 3px;
          border: 1px solid #E5E7EB;
          border-top: 2px solid #4F46E5;
          padding: 32px 48px;
          text-align: center;
          min-width: 220px;
          position: relative;
          opacity: 0;
          transform: translateY(30px);
        ">
      <div style="display:flex; align-items:baseline; justify-content:center; gap:8px; margin-bottom:8px;">
        <div class="beat5-counter" data-target="8.6" data-decimals="1"
             style="
               font-size: 80px;
               font-weight: 800;
               color: #111827;
               line-height: 1;
             ">0</div>
        <!-- Upward arrow -->
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" style="margin-bottom:12px;">
          <path d="M12 4L18 14H6L12 4Z" fill="#16A34A"/>
        </svg>
      </div>
      <div style="
            font-size: 20px;
            color: #6B7280;
            font-weight: 400;
          ">平均质量</div>
      <!-- Trend line beneath card 2 -->
      <svg id="beat5-trend-line" width="200" height="40" viewBox="0 0 200 40"
           style="
             display: block;
             margin: 16px auto 0;
           ">
        <polyline
          points="0,35 30,28 60,30 90,20 120,22 150,12 180,8 200,5"
          fill="none"
          stroke="#4F46E5"
          stroke-width="3"
          stroke-linecap="round"
          stroke-linejoin="round"
          style="stroke-dasharray: 300; stroke-dashoffset: 300;"
        />
      </svg>
    </div>

    <!-- Card 3: Publish Success Rate -->
    <div class="beat5-stat-card" style="
          background: #FFFFFF;
          border-radius: 3px;
          border: 1px solid #E5E7EB;
          border-top: 2px solid #4F46E5;
          padding: 32px 48px;
          text-align: center;
          min-width: 220px;
          opacity: 0;
          transform: translateY(30px);
        ">
      <div style="display:flex; align-items:baseline; justify-content:center; gap:8px; margin-bottom:8px;">
        <div class="beat5-counter" data-target="94" data-decimals="0" data-suffix="%"
             style="
               font-size: 80px;
               font-weight: 800;
               color: #111827;
               line-height: 1;
             ">0</div>
        <!-- Checkmark -->
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" style="margin-bottom:12px;">
          <circle cx="12" cy="12" r="10" fill="#16A34A"/>
          <path d="M8 12L11 15L16 9" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div style="
            font-size: 20px;
            color: #6B7280;
            font-weight: 400;
          ">发布成功率</div>
    </div>
  </div>

  <!-- Monospace registration label -->
  <div style="
        position: absolute;
        bottom: 32px;
        right: 48px;
        font-family: 'Geist Mono', monospace;
        font-size: 14px;
        color: #4F46E5;
        opacity: 0.4;
        z-index: 1;
      ">BEAT 05 — PUBLISH</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
(function () {
  var container = document.querySelector('[data-composition-id="beat-5"]');
  if (!container) return;

  var btn = document.getElementById('beat5-publish-btn');
  var btnInner = btn.querySelector('div');
  var statsContainer = document.getElementById('beat5-stats-container');
  var statCards = container.querySelectorAll('.beat5-stat-card');
  var counters = container.querySelectorAll('.beat5-counter');
  var trendPolyline = container.querySelector('#beat5-trend-line polyline');

  var tl = gsap.timeline({ paused: true });

  // --- Phase 1: Button punch in ---
  tl.fromTo(btnInner,
    { scale: 0, opacity: 0 },
    { scale: 1.1, opacity: 1, duration: 0.25, ease: 'power2.out' },
    0.1
  );
  tl.to(btnInner,
    { scale: 1, duration: 0.15, ease: 'power2.out' }
  );

  // Button fade out (mid-beat, not an exit)
  tl.to(btnInner,
    { opacity: 0, scale: 0.95, duration: 0.3, ease: 'power2.out' },
    1.0
  );
  tl.set(btn, { visibility: 'hidden' });

  // --- Phase 2: Stat cards cascade in ---
  tl.set(statsContainer, { opacity: 1 }, 1.15);
  tl.fromTo(statCards,
    { y: 30, opacity: 0 },
    { y: 0, opacity: 1, duration: 0.35, stagger: 0.12, ease: 'power2.out' },
    1.2
  );

  // --- Counter animations ---
  counters.forEach(function (counter, i) {
    var target = parseFloat(counter.dataset.target);
    var decimals = parseInt(counter.dataset.decimals, 10);
    var suffix = counter.dataset.suffix || '';
    var proxy = { val: 0 };

    tl.fromTo(proxy,
      { val: 0 },
      {
        val: target,
        duration: 0.6,
        ease: 'power1.out',
        onUpdate: function () {
          counter.textContent = proxy.val.toFixed(decimals) + suffix;
        }
      },
      1.3 + i * 0.12
    );
  });

  // --- Trend line draw ---
  if (trendPolyline) {
    var pathLength = trendPolyline.getTotalLength();
    gsap.set(trendPolyline, {
      strokeDasharray: pathLength,
      strokeDashoffset: pathLength
    });

    tl.to(trendPolyline,
      { strokeDashoffset: 0, duration: 0.4, ease: 'power2.out' },
      1.6
    );
  }

  // Register timeline
  window.__timelines = window.__timelines || {};
  window.__timelines['beat-5'] = tl;
})();
</script>
</template>
