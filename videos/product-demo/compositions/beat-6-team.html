<template id="beat-6-template">
  <div data-composition-id="beat-6" data-width="1920" data-height="1080" data-start="0" data-duration="2.50">

    <style>
      [data-composition-id="beat-6"] {
        position: relative;
        width: 1920px;
        height: 1080px;
        background: #F9FAFB;
        font-family: 'Geist', 'Geist Sans', sans-serif;
        overflow: hidden;
      }

      /* Circular dashed border */
      .beat6-circle-border {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 400px;
        height: 400px;
        border: 2px dashed #E5E7EB;
        border-radius: 50%;
        pointer-events: none;
      }

      /* Avatar circles */
      .beat6-avatar {
        position: absolute;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #FFFFFF;
        font-family: 'Geist', 'Geist Sans', sans-serif;
        font-size: 16px;
        font-weight: 600;
        will-change: transform, opacity;
      }

      .beat6-avatar--top {
        top: 340px;
        left: 960px;
        background: #4F46E5;
      }

      .beat6-avatar--right {
        top: 540px;
        left: 1260px;
        background: #16A34A;
      }

      .beat6-avatar--bottom {
        top: 740px;
        left: 960px;
        background: #D97706;
      }

      .beat6-avatar--left {
        top: 540px;
        left: 660px;
        background: #2563EB;
      }

      /* Connection lines SVG */
      .beat6-connections {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .beat6-connection-line {
        fill: none;
        stroke: #4F46E5;
        stroke-width: 2;
        opacity: 0.15;
        will-change: stroke-dashoffset;
      }

      /* Center content card */
      .beat6-content-card {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 200px;
        height: 120px;
        background: #FFFFFF;
        border: 2px solid #E5E7EB;
        border-radius: 6px;
        padding: 16px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        will-change: transform, opacity;
      }

      .beat6-card-title {
        font-family: 'Geist', 'Geist Sans', sans-serif;
        font-size: 16px;
        font-weight: 600;
        color: #111827;
        line-height: 1.3;
      }

      .beat6-quality-badge {
        align-self: flex-start;
        background: #4F46E5;
        color: #FFFFFF;
        font-family: 'Geist Mono', monospace;
        font-size: 16px;
        font-weight: 600;
        padding: 2px 10px;
        border-radius: 4px;
        will-change: transform;
      }

      /* Pulse indicator */
      .beat6-pulse-indicator {
        position: absolute;
        top: calc(50% + 72px);
        left: 50%;
        display: flex;
        align-items: center;
        gap: 6px;
        will-change: opacity;
      }

      .beat6-pulse-dot {
        width: 8px;
        height: 8px;
        background: #4F46E5;
        border-radius: 50%;
      }

      .beat6-pulse-label {
        font-family: 'Geist', 'Geist Sans', sans-serif;
        font-size: 16px;
        color: #6B7280;
      }

      /* Bottom label */
      .beat6-bottom-label {
        position: absolute;
        bottom: 80px;
        left: 50%;
        font-family: 'Geist Mono', monospace;
        font-size: 18px;
        color: #6B7280;
        white-space: nowrap;
        will-change: opacity;
      }
    </style>

    <!-- Circular dashed border -->
    <div class="beat6-circle-border"></div>

    <!-- SVG connection lines -->
    <svg class="beat6-connections" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
      <!-- Top (960,340) to Right (1260,540) -->
      <line class="beat6-connection-line" x1="960" y1="340" x2="1260" y2="540" />
      <!-- Right (1260,540) to Bottom (960,740) -->
      <line class="beat6-connection-line" x1="1260" y1="540" x2="960" y2="740" />
      <!-- Bottom (960,740) to Left (660,540) -->
      <line class="beat6-connection-line" x1="960" y1="740" x2="660" y2="540" />
      <!-- Left (660,540) to Top (960,340) -->
      <line class="beat6-connection-line" x1="660" y1="540" x2="960" y2="340" />
    </svg>

    <!-- Avatars at cardinal positions -->
    <div class="beat6-avatar beat6-avatar--top">策划</div>
    <div class="beat6-avatar beat6-avatar--right">编辑</div>
    <div class="beat6-avatar beat6-avatar--bottom">审核</div>
    <div class="beat6-avatar beat6-avatar--left">发布</div>

    <!-- Center content card -->
    <div class="beat6-content-card">
      <span class="beat6-card-title">品牌推广方案</span>
      <span class="beat6-quality-badge">8.7</span>
    </div>

    <!-- Pulse indicator below card -->
    <div class="beat6-pulse-indicator">
      <span class="beat6-pulse-dot"></span>
      <span class="beat6-pulse-label">进行中</span>
    </div>

    <!-- Bottom label -->
    <div class="beat6-bottom-label">4 人协作 · 实时同步</div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        var composition = document.querySelector('[data-composition-id="beat-6"]');
        if (!composition) return;

        // Ensure scoped selection
        var avatars = composition.querySelectorAll('.beat6-avatar');
        var lines = composition.querySelectorAll('.beat6-connection-line');
        var contentCard = composition.querySelector('.beat6-content-card');
        var qualityBadge = composition.querySelector('.beat6-quality-badge');
        var pulseIndicator = composition.querySelector('.beat6-pulse-indicator');
        var bottomLabel = composition.querySelector('.beat6-bottom-label');

        var tl = gsap.timeline({ paused: true });

        // Center avatars using GSAP transforms (avoids conflict with CSS transform)
        gsap.set(avatars, { xPercent: -50, yPercent: -50 });

        // Center pulse indicator horizontally
        gsap.set(pulseIndicator, { xPercent: -50 });

        // Center bottom label horizontally
        gsap.set(bottomLabel, { xPercent: -50 });

        // --- Avatars (at 0.15s) ---
        // Staggered 0.12s, from scale:0 opacity:0 to scale:1 opacity:1, 0.35s back.out
        tl.fromTo(avatars,
          { scale: 0, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.35, ease: 'back.out(1.7)', stagger: 0.12 },
          0.15
        );

        // --- Connection lines (at 0.5s) ---
        // SVG strokeDashoffset draw, 0.5s each, staggered 0.15s, power2.out
        lines.forEach(function (line) {
          var totalLength = line.getTotalLength();
          gsap.set(line, { strokeDasharray: totalLength, strokeDashoffset: totalLength });
        });

        tl.to(lines,
          { strokeDashoffset: 0, duration: 0.5, ease: 'power2.out', stagger: 0.15 },
          0.5
        );

        // --- Content card (at 0.55s) ---
        // Center with GSAP, set rotation, then animate in
        gsap.set(contentCard, { xPercent: -50, yPercent: -50, rotation: 2 });
        tl.fromTo(contentCard,
          { y: 20, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.4, ease: 'power2.out' },
          0.55
        );

        // --- Quality badge (at 0.9s) ---
        // fromTo: scale:0 -> scale:1.2 -> 1, 0.25s back.out
        gsap.set(qualityBadge, { scale: 0 });
        tl.to(qualityBadge, {
          keyframes: [
            { scale: 1.2, duration: 0.15, ease: 'power2.out' },
            { scale: 1, duration: 0.1, ease: 'power2.inOut' }
          ]
        }, 0.9);

        // --- Pulse indicator (continuous) ---
        // opacity 40% -> 100% -> 40%, 1.2s cycle, yoyo, calculated repeats
        var pulseRepeats = Math.ceil(2.50 / 1.2) - 1; // = 1
        tl.fromTo(pulseIndicator,
          { opacity: 0.4 },
          { opacity: 1, duration: 0.6, ease: 'none', yoyo: true, repeat: pulseRepeats },
          0
        );

        // --- Bottom label (at 0.8s) ---
        // fromTo: opacity:0 -> opacity:1, 0.3s
        tl.fromTo(bottomLabel,
          { opacity: 0 },
          { opacity: 1, duration: 0.3 },
          0.8
        );

        // Register timeline on window
        window.__timelines = window.__timelines || {};
        window.__timelines['beat-6'] = tl;
      })();
    </script>
  </div>
</template>
