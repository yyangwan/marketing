<template id="beat-2-template">
  <div data-composition-id="beat-2" data-width="1920" data-height="1080" data-start="0" data-duration="4.45">

    <style>
      [data-composition-id="beat-2"] {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background-color: #F9FAFB;
        font-family: 'Geist', 'Geist Sans', system-ui, sans-serif;
      }

      /* Corner glow — radial indigo wash top-left */
      .corner-glow {
        position: absolute;
        top: -200px;
        left: -200px;
        width: 1200px;
        height: 1200px;
        background: radial-gradient(circle at center, rgba(79, 70, 229, 0.12) 0%, rgba(249, 250, 251, 0) 70%);
        pointer-events: none;
        z-index: 1;
      }

      /* Vertical accent line left edge */
      .vertical-line {
        position: absolute;
        left: 40px;
        top: 0;
        width: 2px;
        height: 1080px;
        background-color: #4F46E5;
        transform-origin: top center;
        transform: scaleY(0);
        z-index: 2;
      }

      /* Main content container */
      .content-area {
        position: absolute;
        left: 8%;
        top: 30%;
        z-index: 3;
      }

      /* Brand name "ContentOS" */
      .brand-name {
        font-size: 96px;
        font-weight: 800;
        color: #111827;
        line-height: 1.1;
        letter-spacing: -0.02em;
        opacity: 0;
      }

      .brand-name .os-letters {
        color: #4F46E5;
      }

      /* Tagline below brand name */
      .tagline {
        margin-top: 20px;
        font-size: 32px;
        font-weight: 400;
        color: #6B7280;
        line-height: 1.4;
        display: flex;
        flex-wrap: nowrap;
      }

      .tagline .char {
        opacity: 0;
        display: inline-block;
      }

      /* Version label top-right */
      .version-label {
        position: absolute;
        top: 40px;
        right: 60px;
        font-family: 'Geist Mono', 'Geist Mono', monospace;
        font-size: 18px;
        color: #4F46E5;
        opacity: 0.6;
        z-index: 4;
      }
    </style>

    <!-- Background: corner glow -->
    <div class="corner-glow"></div>

    <!-- Background: vertical accent line -->
    <div class="vertical-line"></div>

    <!-- Version monospace label -->
    <div class="version-label">v1.0</div>

    <!-- Main content -->
    <div class="content-area">
      <div class="brand-name">Content<span class="os-letters">OS</span></div>
      <div class="tagline" id="beat-2-tagline">
        <span class="char">一</span><span class="char">站</span><span class="char">式</span><span class="char"> </span><span class="char">A</span><span class="char">I</span><span class="char"> </span><span class="char">内</span><span class="char">容</span><span class="char">营</span><span class="char">销</span><span class="char">平</span><span class="char">台</span>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        // Ensure timeline registry exists
        window.__timelines = window.__timelines || {};

        var tl = gsap.timeline({ paused: true });
        var BEAT_DURATION = 4.45;

        // --- "ContentOS" entrance: y:24, opacity:0 -> y:0, opacity:1 ---
        tl.fromTo('.brand-name', {
          y: 24,
          opacity: 0
        }, {
          y: 0,
          opacity: 1,
          duration: 0.8,
          ease: 'power2.out'
        }, 0.15);

        // --- "OS" letters scale pulse: 1 -> 1.02 -> 1 ---
        tl.fromTo('.os-letters', {
          scale: 1
        }, {
          scale: 1.02,
          duration: 0.15,
          ease: 'power2.inOut',
          yoyo: true,
          repeat: 1
        }, 0.65);

        // --- Tagline typing effect: each char appears at 60ms intervals ---
        var taglineChars = document.querySelectorAll('#beat-2-tagline .char');
        taglineChars.forEach(function (char, i) {
          tl.fromTo(char, {
            opacity: 0,
            y: 8
          }, {
            opacity: 1,
            y: 0,
            duration: 0.15,
            ease: 'power2.out'
          }, 0.6 + i * 0.06);
        });

        // --- Vertical line draw: scaleY 0 -> 1 ---
        tl.fromTo('.vertical-line', {
          scaleY: 0
        }, {
          scaleY: 1,
          duration: 1.0,
          ease: 'power2.out'
        }, 0.2);

        // --- Corner glow gentle pulse: opacity 12% -> 16% -> 12% ---
        // Calculate repeats to fill beat duration. Each full cycle = 4s yoyo.
        // Available time after glow starts: ~4.3s (start at 0.15s into beat).
        // One yoyo cycle = 4s (2s out, 2s back). At least 1 repeat fits.
        tl.fromTo('.corner-glow', {
          opacity: 1
        }, {
          opacity: 1.33,
          duration: 2.0,
          ease: 'sine.inOut',
          yoyo: true,
          repeat: 1
        }, 0.15);

        // Register timeline
        window.__timelines['beat-2'] = tl;
      })();
    </script>

  </div>
</template>
